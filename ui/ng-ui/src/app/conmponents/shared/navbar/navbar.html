<mat-sidenav-container class="sidenav-container">
  <!-- Mobile Side Navigation -->
  <mat-sidenav #drawer class="sidenav" fixedInViewport mode="over" *ngIf="isHandset">
    <mat-toolbar color="primary">
      <mat-icon>{{ user.avatar }}</mat-icon>
      <span>{{ user.name }}</span>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/stream" (click)="drawer.close()">
        <mat-icon matListItemIcon>live_tv</mat-icon>
        <span matListItemTitle>Stream</span>
      </a>
      <a mat-list-item routerLink="/parties" (click)="drawer.close()">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Parties</span>
      </a>
      <mat-divider></mat-divider>
      <a mat-list-item routerLink="/account" (click)="drawer.close()">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Account</span>
      </a>
      <a mat-list-item (click)="drawer.close()">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
      <a mat-list-item (click)="drawer.close()">
        <mat-icon matListItemIcon>help</mat-icon>
        <span matListItemTitle>Help</span>
      </a>
      <a mat-list-item *ngIf="user.loggedIn" (click)="drawer.close()">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- Top Toolbar for both mobile and desktop -->
    <mat-toolbar color="primary" class="toolbar">
      <!-- Mobile menu button -->
      <button
        *ngIf="isHandset"
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <!-- Logo -->
      <span class="logo">{{ title }}</span>
      <span class="spacer"></span>

      <!-- Desktop navigation buttons -->
      <ng-container *ngIf="!isHandset">
        <button mat-button routerLink="/stream">
          <mat-icon>live_tv</mat-icon>
          Stream
        </button>
        <button mat-button routerLink="/parties">
          <mat-icon>group</mat-icon>
          Parties
        </button>

        <!-- Desktop user menu -->
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-avatar-btn">
          <mat-icon>{{ user.avatar }}</mat-icon>
          <span>{{ user.name }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item routerLink="/account">
            <mat-icon>account_circle</mat-icon>
            Account
          </button>
          <button mat-menu-item>
            <mat-icon>settings</mat-icon>
            Settings
          </button>
          <button mat-menu-item>
            <mat-icon>help</mat-icon>
            Help
          </button>
          <button mat-menu-item *ngIf="user.loggedIn">
            <mat-icon>logout</mat-icon>
            Logout
          </button>
        </mat-menu>
      </ng-container>

      <!-- Mobile user info -->
      <ng-container *ngIf="isHandset">
        <mat-icon>{{ user.avatar }}</mat-icon>
        <span>{{ user.name }}</span>
      </ng-container>
    </mat-toolbar>

    <!-- Main content area -->
    <main class="main-content">
      <ng-content></ng-content>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
