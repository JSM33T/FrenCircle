<!-- Desktop Navigation -->
<mat-toolbar color="primary" *ngIf="!isHandset" class="desktop-toolbar">
  <span class="logo">{{ title }}</span>
  <span class="spacer"></span>
  <button mat-button routerLink="/account">
    <mat-icon>account_circle</mat-icon>
    Account
  </button>
  <button mat-button routerLink="/stream">
    <mat-icon>live_tv</mat-icon>
    Stream
  </button>
  <button mat-button routerLink="/parties">
    <mat-icon>group</mat-icon>
    Parties
  </button>

  <!-- Dark Mode Toggle -->
  <div class="dark-mode-toggle">
    <mat-icon>light_mode</mat-icon>
    <mat-slide-toggle
      [checked]="isDarkMode"
      (change)="toggleDarkMode()"
      color="primary">
    </mat-slide-toggle>
    <mat-icon>dark_mode</mat-icon>
  </div>

  <button mat-button [matMenuTriggerFor]="menu">
    <mat-icon>more_vert</mat-icon>
    More
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      Settings
    </button>
    <button mat-menu-item>
      <mat-icon>help</mat-icon>
      Help
    </button>
    <button mat-menu-item>
      <mat-icon>logout</mat-icon>
      Logout
    </button>
  </mat-menu>
</mat-toolbar>

<!-- Mobile Navigation -->
<mat-sidenav-container class="sidenav-container" *ngIf="isHandset">
  <mat-sidenav #drawer class="sidenav" fixedInViewport mode="over">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/account" (click)="drawer.close()">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Account</span>
      </a>
      <a mat-list-item routerLink="/stream" (click)="drawer.close()">
        <mat-icon matListItemIcon>live_tv</mat-icon>
        <span matListItemTitle>Stream</span>
      </a>
      <a mat-list-item routerLink="/parties" (click)="drawer.close()">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Parties</span>
      </a>
      <mat-divider></mat-divider>

      <!-- Dark Mode Toggle for Mobile -->
      <div class="mobile-dark-mode-toggle" style="padding: 16px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center;">
          <mat-icon style="margin-right: 32px;">dark_mode</mat-icon>
          <span>Dark Mode</span>
        </div>
        <mat-slide-toggle
          [checked]="isDarkMode"
          (change)="toggleDarkMode()"
          color="primary">
        </mat-slide-toggle>
      </div>
      <mat-divider></mat-divider>

      <a mat-list-item (click)="drawer.close()">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
      <a mat-list-item (click)="drawer.close()">
        <mat-icon matListItemIcon>help</mat-icon>
        <span matListItemTitle>Help</span>
      </a>
      <a mat-list-item (click)="drawer.close()">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span class="logo">{{ title }}</span>
    </mat-toolbar>

    <!-- Content area -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- Desktop Content -->
<div class="content" *ngIf="!isHandset">
  <router-outlet></router-outlet>
</div>
